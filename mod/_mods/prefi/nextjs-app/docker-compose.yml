version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prefi-nextjs-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GANACHE_RPC=http://ganache:7545
      - NEXT_PUBLIC_BASE_RPC=https://mainnet.base.org
      - NEXT_PUBLIC_BASE_SEPOLIA_RPC=https://sepolia.base.org
      - NEXT_PUBLIC_CHAIN_ID=1337
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    external: true
    name: prefi_default