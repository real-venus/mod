version: '3.8'

services:
  # PreFi Next.js Application - Configured for Base Mainnet
  prefi-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: prefi-nextjs-app
    ports:
      - "3000:3000"
    environment:
      # Production settings
      - NODE_ENV=production

      # Base Mainnet Configuration (Primary Network)
      - NEXT_PUBLIC_BASE_RPC=https://mainnet.base.org
      - NEXT_PUBLIC_CHAIN_ID=8453

      # Alternative RPC endpoints for redundancy
      - NEXT_PUBLIC_BASE_SEPOLIA_RPC=https://sepolia.base.org

      # Contract Addresses (Update after deployment)
      - NEXT_PUBLIC_PREDICTION_MARKET_ADDRESS=${NEXT_PUBLIC_PREDICTION_MARKET_ADDRESS:-0x0000000000000000000000000000000000000000}
      - NEXT_PUBLIC_ORACLE_ADDRESS=${NEXT_PUBLIC_ORACLE_ADDRESS:-0x0000000000000000000000000000000000000000}
      - NEXT_PUBLIC_COLLATERAL_TOKEN=${NEXT_PUBLIC_COLLATERAL_TOKEN:-0x0000000000000000000000000000000000000000}

      # Uniswap V3 Pool Addresses on Base
      - NEXT_PUBLIC_UNISWAP_V3_ETH_USDC_POOL=${NEXT_PUBLIC_UNISWAP_V3_ETH_USDC_POOL:-0xd0b53D9277642d899DF5C87A3966A349A798F224}

      # WalletConnect
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}

      # Optional API Keys for better performance
      - NEXT_PUBLIC_ALCHEMY_API_KEY=${NEXT_PUBLIC_ALCHEMY_API_KEY}
      - NEXT_PUBLIC_INFURA_API_KEY=${NEXT_PUBLIC_INFURA_API_KEY}
    env_file:
      - .env
    networks:
      - prefi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.prefi.description=PreFi Prediction Market - Base Mainnet"
      - "com.prefi.network=base-mainnet"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  prefi_network:
    driver: bridge
    name: prefi_network