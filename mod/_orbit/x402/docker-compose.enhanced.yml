version: '3.8'

services:
  x402-enhanced:
    build:
      context: .
      dockerfile: Dockerfile.enhanced
    ports:
      - "50149:50149"
      - "50150:50150"  # Analytics dashboard
    environment:
      - RECEIVER_ADDRESS=${RECEIVER_ADDRESS:-YourSolanaAddressHere}
      - NETWORK=${NETWORK:-base}
      - PRICE=${PRICE:-1}
      - CURRENCY=${CURRENCY:-USDC}
      - WHITELIST_MODE=${WHITELIST_MODE:-offchain}
      - FRAUD_DETECTION=true
      - DYNAMIC_PRICING=true
      - LOYALTY_REWARDS=true
      - ANALYTICS_ENABLED=true
      - MULTI_CHAIN=true
    volumes:
      - ./whitelist.json:/app/whitelist.json:ro
      - ./analytics:/app/analytics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50149/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - x402-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - x402-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - x402-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - x402-network

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  x402-network:
    driver: bridge
