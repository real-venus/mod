networks:
  default:
    external: true
    name: modnet
services:
  router:
    container_name: router
    deploy: {}
    entrypoint: bash -c "m serve port=50104 key=router remote=0 mod=router"
    image: mod:latest
    ports:
    - 50104:50104
    restart: unless-stopped
    shm_size: 100g
    volumes:
    - ~/mod:/root/mod
    - ~/.mod:/root/.mod
    - ~/mod/mod/core/app/src/api/api/router:/root/mod/mod/core/app/src/api/api/router
    working_dir: /root/mod/mod/core/app/src/api/api/router
version: '3.8'
