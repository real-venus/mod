networks:
  default:
    external: true
    name: modnet
services:
  pm:
    container_name: pm
    deploy: {}
    entrypoint: bash -c "m serve port=50132 key=pm remote=0 mod=pm"
    image: pm
    ports:
    - 50132:50132
    restart: unless-stopped
    shm_size: 100g
    volumes:
    - ~/mod:/root/mod
    - ~/.mod:/root/.mod
    - ~/mod/mod/core/server/pm:/root/mod/mod/core/server/pm
    working_dir: /root/mod/mod/core/server/pm
version: '3.8'
