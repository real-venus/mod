networks:
  default:
    external: true
    name: modnet
services:
  3m-fork:
    container_name: 3m-fork
    deploy: {}
    entrypoint: bash -c "m serve port=50119 key=3m-fork remote=0 mod=3m-fork"
    image: 3m-fork
    ports:
    - 50119:50119
    restart: unless-stopped
    shm_size: 100g
    volumes:
    - ~/mod:/root/mod
    - ~/.mod:/root/.mod
    - ~/mod/mod/orbit/3m-fork:/root/mod/mod/orbit/3m-fork
    working_dir: /root/mod/mod/orbit/3m-fork
version: '3.8'
