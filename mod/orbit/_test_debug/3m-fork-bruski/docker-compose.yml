networks:
  default:
    external: true
    name: modnet
services:
  3m-fork-bruski:
    container_name: 3m-fork-bruski
    deploy: {}
    entrypoint: bash -c "m serve port=50119 key=3m-fork-bruski remote=0 mod=3m-fork-bruski"
    image: 3m-fork-bruski
    ports:
    - 50119:50119
    restart: unless-stopped
    shm_size: 100g
    volumes:
    - ~/mod:/root/mod
    - ~/.mod:/root/.mod
    - ~/mod/mod/orbit/3m-fork-bruski:/root/mod/mod/orbit/3m-fork-bruski
    working_dir: /root/mod/mod/orbit/3m-fork-bruski
version: '3.8'
