version: '3.8'

networks:
  default:
    external: true
    name: modnet

services:
  agent-api:
    container_name: agent-api
    entrypoint: bash -c "cd /root/mod/mod/orbit/agent && uvicorn api.api:app --host 0.0.0.0 --port 50117"
    image: mod:latest
    ports:
      - "50117:50117"
    restart: unless-stopped
    shm_size: 100g
    volumes:
      - ~/mod:/root/mod
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/agent

  agent-app:
    container_name: agent-app
    build:
      context: ./app
    ports:
      - "3117:3117"
    environment:
      - NEXT_PUBLIC_API_URL=http://agent-api:50117
    restart: unless-stopped
    depends_on:
      - agent-api
