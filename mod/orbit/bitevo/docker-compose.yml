networks:
  default:
    external: true
    name: modnet

services:
  bitevo:
    container_name: bitevo
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-50121}:${GATEWAY_PORT:-50121}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-50121}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/bitevo
    entrypoint: ["bash", "/root/mod/mod/orbit/bitevo/docker-entrypoint.sh"]
