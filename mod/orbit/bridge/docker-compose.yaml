services:
  bridge:
    build: .
    container_name: bridge
    image: bridge:latest
    ports:
      - "8840:8840"
      - "8841:8841"
    volumes:
      - .:/root/mod/mod/orbit/bridge
      - bridge_node_modules:/root/mod/mod/orbit/bridge/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=https://api.modc2.com/bridge
      - DEV=1
    restart: unless-stopped

networks:
  default:
    external: true
    name: modnet

volumes:
  bridge_node_modules:
