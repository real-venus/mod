version: '3.8'
networks:
  default:
    external: true
    name: modnet
services:
  bridge:
    build:
      context: ./
    container_name: bridge
    entrypoint: >-
      bash -c "
        cd /root/mod/mod/orbit/bridge &&
        export PYTHONPATH=/root/mod:/root/mod/mod/orbit/bridge &&
        python3 -m uvicorn api:app --host 0.0.0.0 --port 8840 --app-dir ./api --reload &
        cd app && npx next dev -p 8841 &
        wait
      "
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8840
    image: bridge:latest
    ports:
      - 8840:8840
      - 8841:8841
    restart: unless-stopped
    shm_size: 100g
    volumes:
      - ~/mod:/root/mod
      - ~/.mod:/root/.mod
      - ~/.bridge:/root/.bridge
      - /root/mod/mod/orbit/bridge/app/node_modules
      - /root/mod/mod/orbit/bridge/app/.next
    working_dir: /root/mod/mod/orbit/bridge
