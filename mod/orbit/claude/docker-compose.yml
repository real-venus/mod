networks:
  default:
    external: true
    name: modnet

services:
  claude:
    build:
      context: .
      args:
        BUILD_CID: "${BUILD_CID:-}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: claude
    image: claude:latest
    ports:
      - "8823:8823"
    restart: unless-stopped
    environment:
      - API_PORT=8820
      - APP_PORT=8823
      - CLAUDE_JOBS_LOCAL=1
    volumes:
      - "${HOME}/.claude:/host-claude"
      - "${HOME}/.mod/claude:/home/node/.mod/claude"
      - "./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro"
