networks:
  default:
    external: true
    name: modnet

services:
  claudegit:
    container_name: claudegit
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-8831}:${GATEWAY_PORT:-8831}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-8831}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/claudegit
    entrypoint: ["bash", "/root/mod/mod/orbit/claudegit/docker-entrypoint.sh"]
