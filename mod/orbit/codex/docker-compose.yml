networks:
  default:
    external: true
    name: modnet

services:
  codex:
    build:
      context: .
      args:
        BUILD_CID: "${BUILD_CID:-}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: codex
    image: codex:latest
    expose:
      - "8830"
      - "8831"
    restart: unless-stopped
    environment:
      - API_PORT=8830
      - APP_PORT=8831
      # OPENAI_API_KEY is read from the encrypted-key store under
      # /home/node/.mod/codex/keys.json when running. Setting it here
      # (via host .env) only acts as a fallback.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # Owner-managed ciphertext store: wallet address → AES-GCM(key).
      # The Rust API decrypts on demand using the caller's wallet signature.
      - "${HOME}/.mod/codex:/home/node/.mod/codex"
