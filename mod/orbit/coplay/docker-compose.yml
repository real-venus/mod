networks:
  default:
    external: true
    name: modnet

services:
  coplay:
    container_name: coplay
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-3118}:${GATEWAY_PORT:-3118}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-3118}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/coplay
    entrypoint: ["bash", "/root/mod/mod/orbit/coplay/docker-entrypoint.sh"]
