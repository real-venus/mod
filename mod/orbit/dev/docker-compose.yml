networks:
  default:
    external: true
    name: modnet

services:
  dev:
    build:
      context: .
      args:
        BUILD_CID: "${BUILD_CID:-}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: dev
    image: dev:latest
    expose:
      - "8870"
      - "8871"
    restart: unless-stopped
    environment:
      - API_PORT=8870
      - APP_PORT=8871
      - CLAUDE_API=http://claude:8820
      - CODEX_API=http://codex:8830
    volumes:
      # Per-wallet ciphertext store (AES-GCM(api_key)) — server stores
      # opaque ciphertext keyed by wallet address. Plaintext is reconstructed
      # only at request time using the caller's wallet signature.
      - "${HOME}/.mod/dev:/home/node/.mod/dev"
