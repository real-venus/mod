networks:
  default:
    external: true
    name: modnet

services:
  dstore:
    container_name: dstore
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-50151}:${GATEWAY_PORT:-50151}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-50151}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/dstore
    entrypoint: ["bash", "/root/mod/mod/orbit/dstore/docker-entrypoint.sh"]
