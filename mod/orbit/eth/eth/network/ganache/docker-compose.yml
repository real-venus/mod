networks:
  default:
    external: true
    name: modnet
services:
  ganache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ganache
    deploy: {}
    entrypoint: bash -c "m serve port=50126 key=ganache remote=0 mod=ganache"
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8545
      timeout: 5s
    image: ganache
    ports:
    - 50126:50126
    restart: unless-stopped
    shm_size: 100g
    volumes:
    - ~/mod:/root/mod
    - ~/.mod:/root/.mod
    - ~/mod/mod/orbit/eth/eth/network/ganache:/root/mod/mod/orbit/eth/eth/network/ganache
    working_dir: /root/mod/mod/orbit/eth/eth/network/ganache
version: '3.8'
