networks:
  default:
    external: true
    name: modnet

services:
  hippius:
    container_name: hippius
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-50143}:${GATEWAY_PORT:-50143}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-50143}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/hippius
    entrypoint: ["bash", "/root/mod/mod/orbit/hippius/docker-entrypoint.sh"]
