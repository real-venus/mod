networks:
  default:
    external: true
    name: modnet

services:
  ipfs:
    container_name: ipfs
    image: mod:latest
    ports:
      - "${GATEWAY_PORT:-50080}:${GATEWAY_PORT:-50080}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-50080}
    volumes:
      - ~/mod:/root/mod:ro
      - ~/.mod:/root/.mod
    working_dir: /root/mod/mod/orbit/ipfs
    entrypoint: ["bash", "/root/mod/mod/orbit/ipfs/docker-entrypoint.sh"]
