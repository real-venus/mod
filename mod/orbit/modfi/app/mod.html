<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModFi - DeFi Lending Aggregator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0b0f;
    --bg-card: #12131a;
    --bg-card-hover: #181922;
    --border: #1e2030;
    --border-light: #2a2d42;
    --text: #e4e4ed;
    --text-muted: #6b6e82;
    --text-dim: #454760;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.12);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.12);
    --yellow: #eab308;
    --blue: #3b82f6;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 28px;
    padding: 20px 0;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  h1 span {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 400;
  }

  .chain-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  .chain-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue);
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border-light); }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }

  /* Wallet */
  .wallet-btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
  }

  .wallet-btn:hover { opacity: 0.9; }
  .wallet-btn:active { transform: scale(0.98); }

  .wallet-btn.connected {
    background: var(--bg-card-hover);
    border: 1px solid var(--border-light);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .wallet-btn.disconnect {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    width: auto;
    padding: 14px 16px;
    border-radius: 10px;
  }

  .wallet-btn.disconnect:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .wallet-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .wallet-row .wallet-btn.connected { flex: 1; }

  /* Prices */
  .prices-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .price-item {
    flex: 1;
    text-align: center;
    padding: 10px 6px;
    background: var(--bg);
    border-radius: 8px;
  }

  .price-symbol {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .price-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* Rates */
  .rates-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .rate-card {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
  }

  .rate-protocol {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .rate-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }

  .rate-row:last-child { border-bottom: none; }

  .rate-token {
    color: var(--text-muted);
    font-weight: 500;
  }

  .rate-apy {
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    font-weight: 500;
    font-size: 13px;
  }

  .best-badge {
    font-size: 9px;
    font-weight: 600;
    background: var(--green-dim);
    color: var(--green);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    letter-spacing: 0.5px;
  }

  /* Balances */
  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .balance-row:last-child { border-bottom: none; }

  .balance-token {
    font-weight: 600;
    color: var(--text);
  }

  .balance-amount {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 13px;
  }

  .balance-usd {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: 6px;
  }

  /* Form */
  .form-group { margin-bottom: 12px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  select, input[type="text"] {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  select option { background: var(--bg-card); }

  /* Action toggle */
  .action-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
  }

  .action-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .action-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .action-btn.active.withdraw-active {
    background: var(--red);
  }

  /* Submit */
  .submit-btn {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  .submit-btn.withdraw-btn {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }

  /* Rate hint */
  .rate-highlight {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--green);
    text-align: right;
    margin: 4px 0 8px;
    min-height: 18px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    transition: transform 0.3s ease;
    max-width: 90%;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }

  /* Loading */
  .loading {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    text-align: center;
    padding: 12px;
  }

  .hidden { display: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>ModFi</span></h1>
      <div class="subtitle">DeFi Lending Aggregator</div>
      <div class="chain-badge"><span class="chain-dot"></span> Base Mainnet</div>
    </header>

    <!-- Wallet -->
    <div class="card">
      <div id="wallet-section">
        <button class="wallet-btn" id="connect-btn" onclick="connectWallet()">
          Connect Wallet
        </button>
      </div>
    </div>

    <!-- Prices -->
    <div class="card">
      <div class="card-title">Token Prices</div>
      <div class="prices-row" id="prices-row">
        <div class="loading">Loading</div>
      </div>
    </div>

    <!-- Rates -->
    <div class="card">
      <div class="card-title">APY Rates</div>
      <div class="rates-grid" id="rates-grid">
        <div class="loading" style="grid-column:1/-1">Loading</div>
      </div>
    </div>

    <!-- Balances (hidden until connected) -->
    <div class="card hidden" id="balances-box">
      <div class="card-title">Your Balances</div>
      <div id="balances-list">
        <div class="loading">Loading</div>
      </div>
    </div>

    <!-- Action form (hidden until connected) -->
    <div class="card hidden" id="action-box">
      <div class="card-title">Deposit / Withdraw</div>

      <div class="action-toggle">
        <button class="action-btn active" id="deposit-toggle" onclick="setAction('deposit')">Deposit</button>
        <button class="action-btn" id="withdraw-toggle" onclick="setAction('withdraw')">Withdraw</button>
      </div>

      <div class="form-group">
        <label>Token</label>
        <select id="token-select" onchange="updateRateHint()">
          <option value="USDC">USDC</option>
          <option value="USDT">USDT</option>
          <option value="ETH">ETH</option>
        </select>
      </div>

      <div class="form-group">
        <label>Protocol</label>
        <select id="protocol-select" onchange="updateRateHint()">
          <option value="aave">Aave V3</option>
          <option value="compound">Compound V3</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount</label>
        <input type="text" id="amount-input" placeholder="0.00" oninput="validateAmount(this)">
      </div>

      <div class="rate-highlight" id="rate-hint"></div>

      <button class="submit-btn" id="submit-btn" onclick="submitAction()" disabled>
        Deposit
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- State ---
    let wallet = null;
    let currentAction = 'deposit';
    let ratesData = {};
    let pricesData = {};

    const TOKENS = {
      USDC: { address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', decimals: 6 },
      USDT: { address: '0xfde4C96c8593536E31F229EA8f37b2ADa2699bb2', decimals: 6 },
      ETH:  { address: '0x4200000000000000000000000000000000000006', decimals: 18 },
    };

    const CONTRACT_ADDRESS = '0x0000000000000000000000000000000000000000';

    // --- Wallet ---
    async function connectWallet() {
      if (!window.ethereum) {
        showToast('No wallet found — install MetaMask', 'error');
        return;
      }

      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        wallet = accounts[0];

        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (chainId !== '0x2105') {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x2105' }],
            });
          } catch (e) {
            if (e.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0x2105',
                  chainName: 'Base',
                  nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                  rpcUrls: ['https://mainnet.base.org'],
                  blockExplorerUrls: ['https://basescan.org'],
                }],
              });
            }
          }
        }

        renderWalletConnected();
        document.getElementById('balances-box').classList.remove('hidden');
        document.getElementById('action-box').classList.remove('hidden');
        showToast('Wallet connected', 'success');
        loadBalances();
      } catch (e) {
        showToast('Connection failed', 'error');
      }
    }

    function renderWalletConnected() {
      const short = wallet.slice(0, 6) + '...' + wallet.slice(-4);
      document.getElementById('wallet-section').innerHTML = `
        <div class="wallet-row">
          <button class="wallet-btn connected">${short}</button>
          <button class="wallet-btn disconnect" onclick="disconnectWallet()">Disconnect</button>
        </div>
      `;
    }

    function disconnectWallet() {
      wallet = null;
      document.getElementById('wallet-section').innerHTML = `
        <button class="wallet-btn" onclick="connectWallet()">Connect Wallet</button>
      `;
      document.getElementById('balances-box').classList.add('hidden');
      document.getElementById('action-box').classList.add('hidden');
    }

    // --- Load data ---
    async function loadRates() {
      const grid = document.getElementById('rates-grid');
      try {
        const res = await fetch('/api/rates');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        ratesData = data.rates || {};
        renderRates();
      } catch (e) {
        console.error('Rates error:', e);
        grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">Failed to load rates</div>`;
      }
    }

    async function loadPrices() {
      const row = document.getElementById('prices-row');
      try {
        const res = await fetch('/api/prices');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        pricesData = data.prices || {};
        renderPrices();
      } catch (e) {
        console.error('Prices error:', e);
        row.innerHTML = `<div class="error-msg">Failed to load prices</div>`;
      }
    }

    async function loadBalances() {
      if (!wallet) return;
      const list = document.getElementById('balances-list');
      try {
        const res = await fetch(`/api/positions/${wallet}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderBalances(data.balances || {});
      } catch (e) {
        console.error('Balances error:', e);
        list.innerHTML = `<div class="error-msg">Failed to load balances</div>`;
      }
    }

    // --- Render ---
    function renderRates() {
      const grid = document.getElementById('rates-grid');
      let html = '';

      for (const protocol of ['aave', 'compound']) {
        const rates = ratesData[protocol] || {};
        html += `<div class="rate-card">
          <div class="rate-protocol">${protocol === 'aave' ? 'Aave V3' : 'Compound V3'}</div>`;

        for (const token of ['USDC', 'USDT', 'ETH']) {
          const r = rates[token];
          if (r) {
            const otherProtocol = protocol === 'aave' ? 'compound' : 'aave';
            const otherRate = ratesData[otherProtocol]?.[token]?.apy || 0;
            const isBest = r.apy >= otherRate && r.apy > 0;

            html += `<div class="rate-row">
              <span class="rate-token">${token}</span>
              <span>
                <span class="rate-apy">${r.apy}%</span>
                ${isBest ? '<span class="best-badge">BEST</span>' : ''}
              </span>
            </div>`;
          } else {
            html += `<div class="rate-row">
              <span class="rate-token">${token}</span>
              <span class="rate-apy" style="opacity:0.3">--</span>
            </div>`;
          }
        }

        html += '</div>';
      }

      grid.innerHTML = html || '<div class="error-msg" style="grid-column:1/-1">No rate data</div>';
      updateRateHint();
    }

    function renderPrices() {
      const row = document.getElementById('prices-row');
      const entries = Object.entries(pricesData);
      if (entries.length === 0) {
        row.innerHTML = '<div class="error-msg">No price data</div>';
        return;
      }
      let html = '';
      for (const [sym, price] of entries) {
        const fmt = Number(price).toLocaleString(undefined, {
          minimumFractionDigits: 2,
          maximumFractionDigits: price > 10 ? 2 : 4,
        });
        html += `<div class="price-item">
          <div class="price-symbol">${sym}</div>
          <div class="price-val">$${fmt}</div>
        </div>`;
      }
      row.innerHTML = html;
    }

    function renderBalances(balances) {
      const list = document.getElementById('balances-list');
      const entries = Object.entries(balances).filter(([t]) => t !== 'WETH');
      if (entries.length === 0 || entries.every(([, a]) => parseFloat(a) === 0)) {
        list.innerHTML = '<div style="font-size:13px;color:var(--text-dim);text-align:center;padding:12px">No balances</div>';
        return;
      }
      let html = '';
      for (const [token, amount] of entries) {
        const num = parseFloat(amount);
        const display = num < 0.000001 ? '0' : num.toFixed(num < 1 ? 6 : 4);
        const usdVal = pricesData[token] ? (num * pricesData[token]).toFixed(2) : null;
        html += `<div class="balance-row">
          <span class="balance-token">${token}</span>
          <span class="balance-amount">${display}${usdVal ? `<span class="balance-usd">$${usdVal}</span>` : ''}</span>
        </div>`;
      }
      list.innerHTML = html;
    }

    // --- Actions ---
    function setAction(action) {
      currentAction = action;
      const depBtn = document.getElementById('deposit-toggle');
      const witBtn = document.getElementById('withdraw-toggle');
      const subBtn = document.getElementById('submit-btn');

      depBtn.classList.toggle('active', action === 'deposit');
      witBtn.classList.toggle('active', action === 'withdraw');
      witBtn.classList.toggle('withdraw-active', action === 'withdraw');

      subBtn.textContent = action === 'deposit' ? 'Deposit' : 'Withdraw';
      subBtn.classList.toggle('withdraw-btn', action === 'withdraw');
    }

    function validateAmount(input) {
      input.value = input.value.replace(/[^0-9.]/g, '');
      const parts = input.value.split('.');
      if (parts.length > 2) input.value = parts[0] + '.' + parts.slice(1).join('');

      const btn = document.getElementById('submit-btn');
      btn.disabled = !input.value || parseFloat(input.value) <= 0;
    }

    function updateRateHint() {
      const token = document.getElementById('token-select').value;
      const protocol = document.getElementById('protocol-select').value;
      const hint = document.getElementById('rate-hint');

      const rate = ratesData[protocol]?.[token];
      hint.textContent = rate ? `${rate.apy}% APY` : '';
    }

    async function submitAction() {
      if (!wallet || !window.ethereum) return;

      const token = document.getElementById('token-select').value;
      const protocol = document.getElementById('protocol-select').value;
      const amount = document.getElementById('amount-input').value;

      if (!amount || parseFloat(amount) <= 0) return;

      const tokenInfo = TOKENS[token];
      const decimals = tokenInfo.decimals;

      const parts = amount.split('.');
      let whole = parts[0] || '0';
      let frac = (parts[1] || '').padEnd(decimals, '0').slice(0, decimals);
      const amountWei = BigInt(whole) * BigInt(10 ** decimals) + BigInt(frac);

      if (CONTRACT_ADDRESS === '0x0000000000000000000000000000000000000000') {
        showToast('Aggregator contract not deployed yet', 'error');
        return;
      }

      try {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Processing...';

        if (currentAction === 'deposit' && token !== 'ETH') {
          showToast('Approve token spend...', '');
          const approveData = '0x095ea7b3' +
            CONTRACT_ADDRESS.slice(2).padStart(64, '0') +
            amountWei.toString(16).padStart(64, '0');

          await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{ from: wallet, to: tokenInfo.address, data: approveData }],
          });

          showToast('Approved! Sending deposit...', 'success');
        }

        const funcSig = currentAction === 'deposit'
          ? '0x1e4f0e03'
          : '0x69328dec';

        const encodedToken = tokenInfo.address.slice(2).padStart(64, '0');
        const encodedAmount = amountWei.toString(16).padStart(64, '0');
        const protocolBytes = Array.from(new TextEncoder().encode(protocol))
          .map(b => b.toString(16).padStart(2, '0')).join('');
        const encodedOffset = (96).toString(16).padStart(64, '0');
        const encodedStrLen = protocol.length.toString(16).padStart(64, '0');
        const encodedStrData = protocolBytes.padEnd(64, '0');

        const calldata = funcSig + encodedToken + encodedAmount + encodedOffset + encodedStrLen + encodedStrData;

        const txHash = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{ from: wallet, to: CONTRACT_ADDRESS, data: calldata }],
        });

        showToast(`TX sent: ${txHash.slice(0, 10)}...`, 'success');
        btn.textContent = currentAction === 'deposit' ? 'Deposit' : 'Withdraw';
        btn.disabled = false;

        setTimeout(loadBalances, 5000);
      } catch (e) {
        showToast(e.message?.slice(0, 60) || 'Transaction failed', 'error');
        const btn = document.getElementById('submit-btn');
        btn.textContent = currentAction === 'deposit' ? 'Deposit' : 'Withdraw';
        btn.disabled = false;
      }
    }

    // --- Toast ---
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (type ? ` ${type}` : '');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    // --- Account change listener ---
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
          disconnectWallet();
        } else {
          wallet = accounts[0];
          renderWalletConnected();
          loadBalances();
        }
      });
      window.ethereum.on('chainChanged', () => window.location.reload());
    }

    // --- Init ---
    loadPrices();
    loadRates();
    setInterval(loadRates, 300000);
    setInterval(loadPrices, 60000);
  </script>
</body>
</html>
