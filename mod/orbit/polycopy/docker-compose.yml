version: '3.8'

networks:
  polycopy-network:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: polycopy-backend
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ~/.mod:/root/.mod
      - ./polycopy:/app/polycopy
    restart: unless-stopped
    networks:
      - polycopy-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: polycopy-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - polycopy-network
