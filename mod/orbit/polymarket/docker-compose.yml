services:
  polymarket:
    build: .
    container_name: polymarket
    ports:
      - "${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
    restart: unless-stopped
    volumes:
      - polymarket-strats:/tmp/polymarket-strats
      - ./src/app/app:/app/src/app/app:delegated
      - ./src/app/tsconfig.json:/app/src/app/tsconfig.json:ro
      - ./src/app/tailwind.config.js:/app/src/app/tailwind.config.js:ro
      - ./src/app/postcss.config.js:/app/src/app/postcss.config.js:ro
      - ./docker-entrypoint.dev.sh:/app/docker-entrypoint.sh:ro
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-3000}
      - STRAT_HMAC_SECRET=${STRAT_HMAC_SECRET:-polymarket_strats_default_hmac_key_2024}

volumes:
  polymarket-strats:
