networks:
  default:
    external: true
    name: modnet

services:
  tt:
    build: .
    container_name: tt
    ports:
      - "${GATEWAY_PORT:-8850}:${GATEWAY_PORT:-8850}"
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-8850}
    volumes:
      - tt-data:/app/data

volumes:
  tt-data:
