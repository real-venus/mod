[package]
name = "whitepaper-api"
version = "0.1.0"
edition = "2021"
description = "Rust API for the MOD whitepaper module — Merkle-tree off-chain registry"

[[bin]]
name = "whitepaper-api"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.5", features = ["cors"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny-keccak = { version = "2", features = ["keccak"] }
hex = "0.4"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }
walkdir = "2"

[profile.release]
opt-level = 3
lto = "thin"
strip = true
